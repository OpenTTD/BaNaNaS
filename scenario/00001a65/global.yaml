name: "Hungary Temperate C JGRPP 8K*4K"
description: |-
  Hungary temperate 8192×4096 scenario with towns and random industries.

  A scenario of Hungary based on a real heightmap, including the major rivers. Map size: 8192×4096, no NewGRFs required. Available in more separate versions: Temperate and Arctic (the latter can be turned into an alpine setting with NewGRFs). The map covers Hungary and parts of the surrounding countries, including Austria, Slovakia, Ukraine, Romania, Serbia, Croatia, and Slovenia. Towns and random generated industries.
url: "https://github.com/harbonah/games-openttd-scenario-hungary"
