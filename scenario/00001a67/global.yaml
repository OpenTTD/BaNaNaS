name: "Hungary Alpine B JGRPP 8K*4K"
description: |-
  Hungary "alpine" 8192×4096 scenario with only towns, random industries

  A scenario of Hungary based on a real heightmap, including the major rivers. Map size: 8192×4096, no NewGRFs required. Alpine version, OpenGFX+ Landscapes and Central European Town NewGRF required. The map covers Hungary and parts of the surrounding countries, including Austria, Slovakia, Ukraine, Romania, Serbia, Croatia, and Slovenia. Towns with random industries.
