name: "Trans AI"
description: |-
  An AI that is developed by Fanioz as an effort to be a transporter.
  Had Bus, Truck, Tram, Ship, Airplane and Chopper.

  * Fixes 🛠️ :
  Resolved crashes in AIEventDisasterZeppelinerCleared, XVehicle.ReadRoute (cargo detection), and stale data (#8).

  Fixed AIEngine.GetMaximumOrderDistance for vanilla aircraft and improved route assignment (#6).

  Rail: New check prevents adding trains to full single-track lines (#5).

  API: Support for API 14; removed obsolete adjacent_stations.

  See changelog.txt
