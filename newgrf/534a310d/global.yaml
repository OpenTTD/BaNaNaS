name: "JamesTrains"
description: |-
  This is an addon set, using existing sprites made by Timberwolf himself, for Timberwolf's trains. This set massively
  expands the selection of early BR (1950s), Grouping (1923-1948) and Pre-Grouping (Pre-1923) steam locomotives from
  1869 to 1954. This should enable the determined rail fan to run any one of the major railways from the period with
  only locomotives from that railway.
url: "https://github.com/SquireJames/james-trains"
