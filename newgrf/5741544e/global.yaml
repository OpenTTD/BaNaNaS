name: "West Africa Town Names"
description: "A NewGRF for OpenTTD adding real town and city names from West Africa, covering Nigeria, Ghana, Senegal, Mali, Côte d'Ivoire, Burkina Faso, Guinea, Benin, Togo, Sierra Leone, Liberia, Niger, Gambia, Guinea-Bissau, Mauritania, and Cape Verde. ~180 names."
