name: "Iron Horse 4 (Trains)"
description: |-
  Iron Horse 4.

  A comprehensive train set with a gameplay focus, including a full set of steam, diesel and electric trains spanning 1860 to 2020.

  Also includes high speed trains, narrow gauge trains and metro trains.

  Inspired (mostly) by British and Irish trains.

  Features options for simplified gameplay with fewer trains, including 'wagons-only' mode. Adjustable train cargo capacity.
