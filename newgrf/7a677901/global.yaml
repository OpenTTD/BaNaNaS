name: "Universal Climate Houses"
description: |-
  https://github.com/GraionDilach/universal-climate-houses

  A simple NewGRF to enable vanilla temperate/arctic/sub-tropic houses on other climates. It also allows Temperate houses and all flats to also accept Food and more reasonable Fizzy Drink handling on Toyland. Does not include additional artwork.

