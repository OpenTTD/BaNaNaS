description: |-
  A tiny invisible engine with no power that you can place front of trains to overcome coupling restrictions and other NewGRF limitations. Or place at the rear to enable any train to drive backwards.

  Now also includes an invisible wagon that can be used to override the backwards driving feature. Includes a parameter for a power booster engine. Supports all vanilla railtypes, as well as narrow gauge, metro and vactrain.

  Coded and (not) drawn by Emperor Jake.
